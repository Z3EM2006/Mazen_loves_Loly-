<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لـ نور عيني ❤</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #2c003e 0%, #000000 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; overflow: hidden; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 600px; text-align: center; z-index: 10; }
        .hidden { display: none; }
        button { background: linear-gradient(145deg, #8e44ad, #732d91); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; margin: 5px; box-shadow: 3px 3px 6px rgba(0,0,0,0.4); transition: 0.2s; }
        button:active { transform: translateY(3px); }
        img, video { width: 100%; height: 350px; object-fit: cover; border-radius: 15px; border: 5px solid #fff; margin-bottom: 15px; }
        .falling-heart { position: fixed; top: -10vh; font-size: 25px; pointer-events: none; z-index: 1; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

<div class="card" id="loginArea">
    <h2>أهلاً يا نور عيني 🌸</h2>
    <input type="password" id="passInput" placeholder="اكتبي الباسورد" style="padding: 12px; border-radius: 20px; width: 80%; text-align: center; border: 1px solid #ccc;">
    <br><button onclick="checkPassword()">ابدئي الرحلة ❤</button>
</div>

<div class="card hidden" id="messageArea">
    <p id="loveText" style="text-align: right; color: #333; line-height: 1.8; height: 250px; overflow-y: auto; font-size: 18px; border: 1px solid #eee; padding: 10px;"></p>
    <button id="nextBtn" class="hidden" onclick="showMain()">شوفي ذكرياتنا يا روحي 📸</button>
</div>

<div class="card hidden" id="mainArea">
    <div id="mediaContainer"></div>
    <p id="mediaText" style="font-weight: bold; color: #5e3370; min-height: 50px;"></p>
    <button onclick="nextMedia()">التالي ❤</button>
    <br>
    <button style="background: #27ae60;" onclick="switchToVideos()">فيديوهاتنا 🎥</button>
    <button style="background: #2980b9;" onclick="playMusic()">أغنيتنا 🎵</button>
</div>

<script>
    const fullText = "عايز اقلك اني مش بحبك 🥺انا بعشقك 😉😉ولو في كلمه اكبر من بعشقك كنت قلتها ليكي❤🌍ولو في كلام يوصف حبي ليكي او يوصف حته ربع حبي ليكي انا بحبك لدرجة اني مستعد اموت علشانك ❤️واخسر اي حاجه عشان نفضل مع بعض ❤️❤️🌍وافضل اعمل المستحيل عشان نبقى مع بعض 🌍❤حتى لو الدنيا كلها قالت مستحيل هفضل احاول عشان والله انتي ليا انا وبس 🌚❤️‍🩹وانا عارف ان في النهايه حبي وحبك هما الي هيفوزو على الدنيا باللي فيها وعارف ان ربنا حاسس بيا وهيستجيب لي دعواتي 🙏💓وربنا شايف اكيد انا بحبك ازاي وانتي بالنسبالي اي انا أصلاً حياتي بقت حلوه بسببك انتي وجودك خلاني ارجع احب الحياه حبيت حياتي عشان انتي فيها 🫂❤❤وكل يوم بدعي ربنا يحفظك ليا ويحميكي ويبعد عنك اي حاجه وحشه ✨❤ويجعلك من نصيبي كل صلاه بدعي اننا نبقى لبعض اي حد ممكن يقول اني زهقت من علاقتنا او مليت بس انا عمري ما مليت منك ابداً ي حبيبتي ❤🌍والله دول مش يومين عشتهم معاكي حلوين وخلاص هفضل انا احبك لحد آخر يوم في عمري 🌍❤❤انا جنبك لحد آخر نفس في عمري انا فضلت اتعلم الحب معاكي عرفت الحب 🫀❤لمه حبيتك حب مفيش واحد هيعرف يحبه مفيش كلام في الدنيا يقدر يوصف انا حبيتك قد اي🌚❤️‍🩹❤️‍🩹وتقدري تقولي انا مصدقت اني لقيت نصي التاني ساعات بحس اني ابنك وبباكي وانتي بنتي وحبيبتي وروح قلبي ❤🌍ولو فضلت اتكلم عمري كلو مش هديكي حقك مش هديكي حقك من الي بتعمليه معايا 🌘🫂🥹بس مفيش احن منك في الدنيا❤️‍🔥🌘كده دي اكتر حاجه مخلياني احبك ومتعلق بيكي برتاح لمه باجي افضفضلك من حجات مضيقاني❤🫂جيتي ختيني من وسط عالم غريب كنت تايه فيه كنت كاره حياتي باللي فيها انتي جيتي غيرتي كل ده 🥹❤❤انتي غيرتيني انا بصي بجد الكلام ده ليكي ي نور عيني انتي الي تستاهلي كل لحظه حلوه من عمري وحياتي انتي فعلاً حاجه حلوه في حياتي وعمري مشوف زيك تاني في حياتي بجد عشان انتي الوحيدة الي حبيتها وحبيتش حد غيرك اكتر من نفسي بجد في الدنيا دي وفرحان عشان انتي معايا وربنا يديمك ليا ي روحي وانتي هتفضلي في قلبي وبس عشان انتي قلبي والله وبحبك اوي كمان وربنا يخليكي ليا ميحرمنيش منك ابداً ي نور عيني 💞🫂 محظوظ علشان انتي دخلتي حياتي انا ربنا عطاني هديه وكانت احلى هديه من ربنا والله 😉😉😘بحبك والله ومقدرش استغنى عنك مهما حصل";

    const gallery = [
        {type: "img", src: "loly1.jpg", text: "أول صورة لينا يا روحي ❤"},
        {type: "img", src: "loly2.jpg", text: "ضحكتك دي هي دنيتي 🌍"},
        {type: "img", src: "loly3.jpg", text: "أحلى هدية من ربنا 🫂"},
        {type: "img", src: "loly4.jpg", text: "مع بعض هنعدي كل حاجة 💓"},
        {type: "img", src: "loly5.jpg", text: "انتي قلبي وروحي وكل حياتي ✨"}
    ];
    const videos = [
        {type: "vid", src: "video1.mp4", text: "فيديو ذكرى 1 🎥"},
        {type: "vid", src: "video2.mp4", text: "فيديو ذكرى 2 🎥"},
        {type: "vid", src: "video3.mp4", text: "فيديو ذكرى 3 🎥"},
        {type: "vid", src: "video4.mp4", text: "فيديو ذكرى 4 🎥"}
    ];

    let currentList = gallery, index = 0;

    function checkPassword() {
        if (document.getElementById("passInput").value === "loly") {
            document.getElementById("loginArea").classList.add("hidden");
            document.getElementById("messageArea").classList.remove("hidden");
            typeWriter();
        } else { alert("الباسورد غلط!"); }
    }

    function typeWriter() {
        let i = 0;
        const textElement = document.getElementById("loveText");
        function writer() {
            if (i < fullText.length) {
                textElement.innerHTML += fullText.charAt(i);
                i++;
                setTimeout(writer, 35); // تأثير الكتابة حرف بحرف
            } else {
                document.getElementById("nextBtn").classList.remove("hidden");
            }
        }
        writer();
    }

    function showMain() {
        document.getElementById("messageArea").classList.add("hidden");
        document.getElementById("mainArea").classList.remove("hidden");
        render();
    }

    function render() {
        const item = currentList[index];
        document.getElementById("mediaContainer").innerHTML = item.type === "vid" 
            ? `<video controls src="${item.src}"></video>` 
            : `<img src="${item.src}">`;
        document.getElementById("mediaText").innerText = item.text;
    }

    function nextMedia() { index = (index + 1) % currentList.length; render(); }
    function switchToVideos() { currentList = videos; index = 0; render(); }
    function playMusic() { new Audio('song.mp3').play(); } // الأغنية موجودة في نفس مجلد الـ HTML

    // القلوب المتساقطة
    setInterval(() => {
        const h = document.createElement('div');
        h.className = 'falling-heart';
        h.innerHTML = ['❤️', '💘', '💕', '💜', '❤️‍🩹'][Math.floor(Math.random()*5)];
        h.style.left = Math.random() * 100 + 'vw';
        h.style.animationDuration = Math.random() * 3 + 3 + 's';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 6000);
    }, 150);
</script>
</body>
</html>
